name: "GitHub Pages"
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    name: "Export Web"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: "Setup Godot"
        uses: chickensoft-games/setup-godot@v2
        with:
          # Using the version the user has
          version: 4.6.1
          use_dotnet: false

      - name: "Export Web"
        run: |
          mkdir -pv build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: "Move coi-serviceworker"
        run: |
          mkdir -p build/web
          cp coi-serviceworker.js build/web/

      - name: "Deploy to GitHub Pages"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/web
