name: "GitHub Pages"
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    name: "Export Web"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: "Download Godot 4.3 Standard"
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip Godot_v4.3-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf templates Godot_v4.3-stable_export_templates.tpz

      - name: "Export Web"
        run: |
          mkdir -pv build/web
          ./Godot_v4.3-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html

      - name: "Move coi-serviceworker"
        run: |
          mkdir -p build/web
          cp coi-serviceworker.js build/web/

      - name: "Deploy to GitHub Pages"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/web
